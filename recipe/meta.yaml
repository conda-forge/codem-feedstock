{% set name = "codem" %}
{% set version = "0.26.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/codem-{{ version }}.tar.gz
  sha256: 75ec628c0073c12f8f9fbe10c4c9f1b85facb1238decc1a9c984559f4478d66a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  entry_points:
    - codem = codem.main:main
    - vcd = vcd.main:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=64.0
  run:
    - python >={{ python_min }}
    - typing-extensions
    - numpy
    - {{ pin_compatible('python-pdal', max_pin='x.x.x') }}
    - opencv
    - rasterio
    - trimesh
    - matplotlib-base
    - scikit-image
    - rich
    - pyproj
    - pyshp
    - pandas
    - scipy
    - pyyaml
    - mesalib

test:
  imports:
    - codem
    - vcd
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/NCALM-UH/CODEM
  summary: A package for co-registering geospatial data
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - j9ac9k
    - hobu
    - chambbj
